id: lyrecoul.penmods
kind: core
name: PenMods
author: Lyrecoul
category: core
summary: PenMods core runtime, updater, and plugin host.
description: |
  PenMods is the core project that provides the runtime, updater, and plugin
  loading foundation for the broader PenMods ecosystem.
icon: https://raw.githubusercontent.com/Lyrecoul/PenMods/main/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.webp
repo_url: https://github.com/Lyrecoul/PenMods
homepage: https://github.com/Lyrecoul/PenMods
download_url: https://github.com/Lyrecoul/PenMods/releases/latest
releases_url: https://github.com/Lyrecoul/PenMods/releases
version: main
license: GPL-3.0
source_available: true
visibility: public
distribution:
  type: github-release
  url: https://github.com/Lyrecoul/PenMods/releases/latest
  notes: Official GitHub Releases channel for PenMods builds.
update:
  strategy: copy-restart
  target_path: /userdata/PenMods/libPenMods.so
  requires_restart: true
  notes: Copy libPenMods.so to the target path, then restart PenMods.
verified: true
tags:
  - core
  - runtime
  - updater
compatibility:
  capabilities:
    optional:
      - capability:network.fetch
  capability_history:
    - capability: capability:ota.mod-update
      since_version: main
      since_ci_version: "Build PenMods #32"
    - capability: capability:runtime.external-resource
      since_version: main
      since_ci_version: "Build PenMods #32"
    - capability: capability:plugin-loader
      since_version: main
      since_ci_version: "Build PenMods #32"
    - capability: capability:plugin.qml
      since_version: main
      since_ci_version: "Build PenMods #32"
    - capability: capability:plugin.engine-attach
      since_version: main
      since_ci_version: "Build PenMods #32"
    - capability: capability:plugin.hook-api
      since_version: main
      since_ci_version: "Build PenMods #33"
    - capability: capability:ui.plugin-entry
      since_version: main
      since_ci_version: "Build PenMods #36"
    - capability: capability:file-manager
      since_version: main
      since_ci_version: "Build PenMods #42"
    - capability: capability:audio.daemon
      since_version: main
      since_ci_version: "Build PenMods #44"
    - capability: capability:tts
      since_version: main
      since_ci_version: "Build PenMods #45"
    - capability: capability:shell.execute
      since_version: main
      since_ci_version: "Build PenMods #46"
    - capability: capability:shell.execute-async
      since_version: main
      since_ci_version: "Build PenMods #60"
    - capability: capability:screen.audio-wakelock
      since_version: main
      since_ci_version: "Build PenMods #55"
    - capability: capability:chatbot.tool.tavily
      since_version: main
      since_ci_version: "Build PenMods #54"
    - capability: capability:math.render
      since_version: main
      since_ci_version: "Build PenMods #58"
    - capability: capability:camera.capture
      since_version: main
      since_ci_version: "Build PenMods #64"
    - capability: capability:chatbot.vision-proxy
      since_version: main
      since_ci_version: "Build PenMods #64"
provides:
  - capability:audio.daemon
  - capability:camera.capture
  - capability:chatbot.tool.tavily
  - capability:chatbot.vision-proxy
  - capability:file-manager
  - capability:math.render
  - capability:network.fetch
  - capability:ota.mod-update
  - capability:runtime
  - capability:runtime.external-resource
  - capability:plugin-loader
  - capability:plugin.engine-attach
  - capability:plugin.hook-api
  - capability:plugin.native
  - capability:plugin.qml
  - capability:screen.audio-wakelock
  - capability:shell.execute
  - capability:shell.execute-async
  - capability:updater
  - capability:settings
  - capability:tts
  - capability:ui.plugin-entry
dependencies:
  optional:
    - id: lyrecoul.penmods-installer
      reason: Can be paired with an external installer or distribution helper.
