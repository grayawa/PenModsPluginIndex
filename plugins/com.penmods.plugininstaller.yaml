id: com.penmods.plugininstaller
kind: plugin
name: 插件安装器
author: OpenAI
category: utility
summary: 从 PenMods Plugin Index 搜索、安装并管理插件。
description: |
  插件安装器用于读取 PenMods Plugin Index 提供的注册表 JSON，
  按原生插件 id 跟踪已安装条目，并将插件安装到
  /userdisk/PenMods/plugins 目录。
icon: https://raw.githubusercontent.com/github/explore/main/topics/sqlite/sqlite.png
repo_url: https://github.com/grayawa/PenModsPluginInstaller
homepage: https://github.com/grayawa/PenModsPluginInstaller
download_url: https://github.com/grayawa/PenModsPluginInstaller/releases/latest
releases_url: https://github.com/grayawa/PenModsPluginInstaller/releases
version: 0.1.0
license: MIT
source_available: true
visibility: public
distribution:
  type: github-release
  url: https://github.com/grayawa/PenModsPluginInstaller/releases/latest
  notes: Installer plugin release channel.
verified: false
tags:
  - installer
  - registry
  - utility
compatibility:
  capabilities:
    requires:
      - capability:plugin-loader
    optional:
      - capability:settings
provides:
  - capability:plugin.install
  - capability:plugin.update
  - capability:plugin.registry-client
dependencies:
  required:
    - id: lyrecoul.penmods
      capabilities:
        - capability:plugin-loader
      reason: Requires the PenMods runtime and plugin loading environment.
