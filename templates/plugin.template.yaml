id: com.example.plugin
kind: plugin
name: Your Plugin Name
author: Your Name or Team
category: utility
summary: One-line summary of what the plugin does.
description: |
  Longer description for the plugin detail page.
icon: https://example.com/icon.png
repo_url: https://github.com/your-org/your-plugin
homepage: https://example.com/your-plugin
download_url: https://github.com/your-org/your-plugin/releases/latest
releases_url: https://github.com/your-org/your-plugin/releases
version: 1.0.0
license: MIT
source_available: true
visibility: public
distribution:
  type: github-release
  url: https://github.com/your-org/your-plugin/releases/latest
  notes: Public release page for the plugin package.
update:
  strategy: direct
  requires_restart: false
  notes: Regular plugins can usually be installed directly.
verified: false
tags:
  - utility
  - editor
screenshots:
  - https://example.com/screenshot-1.png
compatibility:
  penmods: ">=1.0.0"
  capabilities:
    requires:
      - capability:ui.panel
      - capability:editor.commands
    conflicts:
      - capability:runtime.legacy-hooks
    optional:
      - capability:network.fetch
  capability_history:
    - capability: capability:panel.example
      since_version: "1.0.0"
      since_ci_version: "optional-ci-build-id"
provides:
  - capability:panel.example
dependencies:
  required:
    - id: penmods.core-ui
      version: ">=1.0.0"
      reason: Required for the plugin panel host.
  optional:
    - id: penmods.theme-hooks
      reason: Enables theme-aware styling when available.
  peer:
    - id: penmods.git-core
      capabilities:
        - capability:api.repo-status
      reason: Integrates with Git status if installed.
  incompatible:
    - id: penmods.legacy-panel
      reason: Uses the same panel slot and cannot run together.
