name: Validate Registry

on:
  pull_request:
    branches:
      - registry
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout registry data
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || 'registry' }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          path: .registry

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate registry
        run: npm run validate
        env:
          REGISTRY_PLUGINS_DIR: .registry/plugins
