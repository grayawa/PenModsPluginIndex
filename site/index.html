<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PenMods Plugin Index</title>
    <meta
      name="description"
      content="PenMods 社区维护的插件索引站。"
    />
    <script>
      (() => {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-glow background-glow-a"></div>
    <div class="background-glow background-glow-b"></div>
    <main class="layout">
      <section class="hero" id="hero">
        <div>
          <p class="eyebrow">PenMods Plugin Index</p>
          <h1>插件索引</h1>
          <p class="hero-subtitle">给 PenMods 生态用的插件目录。</p>
        </div>
        <div class="hero-side">
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换暗色模式">
            <img id="themeToggleIcon" alt="" aria-hidden="true" />
          </button>
          <p class="hero-copy">
            浏览社区插件，查看分类、兼容性与功能声明，找到适合当前
            PenMods 环境的扩展。
          </p>
          <div class="hero-stats" id="stats"></div>
        </div>
      </section>

      <section class="controls">
        <label class="search">
          <span>搜索</span>
          <input
            id="searchInput"
            type="search"
            placeholder="按名称、作者、标签或功能搜索"
          />
        </label>
        <label class="filter">
          <span>分类</span>
          <select id="categoryFilter">
            <option value="">全部分类</option>
          </select>
        </label>
        <fieldset class="filter tag-filter">
          <legend>标签</legend>
          <div class="tag-picker" id="tagFilter"></div>
        </fieldset>
      </section>

      <section class="content">
        <div class="plugin-list" id="pluginList"></div>
        <aside class="plugin-detail" id="pluginDetail">
          <div class="detail-empty">
            <p>选择一个插件以查看完整元数据。</p>
          </div>
        </aside>
      </section>
    </main>

    <template id="pluginCardTemplate">
      <article class="plugin-card">
        <img class="plugin-card-icon" alt="" />
        <div class="plugin-card-body">
          <div class="plugin-card-topline">
            <h2></h2>
            <span class="badge version"></span>
          </div>
          <p class="plugin-card-summary"></p>
          <p class="plugin-card-meta"></p>
          <div class="tag-row"></div>
        </div>
      </article>
    </template>

    <script type="module" src="./main.js"></script>
  </body>
  </html>
